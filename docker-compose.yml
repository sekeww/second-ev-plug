services:
  ollama:
    image: ollama/ollama:latest
    container_name: internal-llm-ollama
    networks:
      - internal-llm
    volumes:
      - ollama-models:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  model-puller:
    image: ollama/ollama:latest
    container_name: internal-llm-model-puller
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - internal-llm
    environment:
      OLLAMA_HOST: http://ollama:11434
      CHAT_MODEL: ${CHAT_MODEL:-qwen2.5-coder:1.5b}
      AUTOCOMPLETE_MODEL: ${AUTOCOMPLETE_MODEL:-qwen2.5-coder:1.5b}
    entrypoint: /bin/sh
    command:
      - -c
      - |
        set -e
        echo "pulling chat model: $$CHAT_MODEL"
        ollama pull "$$CHAT_MODEL"
        if [ "$$AUTOCOMPLETE_MODEL" != "$$CHAT_MODEL" ]; then
          echo "pulling autocomplete model: $$AUTOCOMPLETE_MODEL"
          ollama pull "$$AUTOCOMPLETE_MODEL"
        fi
        echo "models ready"
    restart: "no"

  gateway:
    image: nginx:1.27-alpine
    container_name: internal-llm-gateway
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - internal-llm
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped

networks:
  internal-llm:
    driver: bridge

volumes:
  ollama-models:
