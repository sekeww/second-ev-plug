worker_processes 1;

events {
    worker_connections 1024;
}

http {
    access_log /dev/stdout;
    error_log  /dev/stderr warn;

    upstream ollama_upstream {
        server ollama:11434;
        keepalive 8;
    }

    # Streaming-friendly settings
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;

    server {
        listen 8080;
        server_name _;

        # OpenAI-compatible endpoints: /v1/chat/completions, /v1/completions,
        # /v1/embeddings, /v1/models. Ollama serves these natively at /v1/.
        location /v1/ {
            proxy_pass http://ollama_upstream;
            proxy_set_header Host $host;
        }

        # Ollama-native endpoints (kept for Continue's native Ollama provider,
        # in case OpenAI-compatible path has quirks with a given feature).
        location /api/ {
            proxy_pass http://ollama_upstream;
            proxy_set_header Host $host;
        }

        location = /healthz {
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        location / {
            return 404;
        }
    }
}
